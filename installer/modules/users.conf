---
defaultGroups:
  - name: sudo
    must_exist: true
    system: true

# Debian already grants administrative access to members of %sudo.
# Do not generate a duplicate rule in /etc/sudoers.d.
sudoersGroup: ""
sudoersConfigureWithGroup: true

# Starlight OS follows the desktop model: the installed user administers
# the machine with sudo and direct password-based root login stays locked.
setRootPassword: false
doReusePassword: false

doAutologin: false
allowWeakPasswords: true
allowWeakPasswordsDefault: true

passwordRequirements:
  minLength: 1
  maxLength: 128

user:
  shell: /bin/bash
  forbidden_names: [ root, starlight ]
  home_permissions: "o700"

hostname:
  location: EtcFile
  writeHostsFile: true
  template: "starlight-${login}"
  forbidden_names: [ localhost ]

allowActiveDirectory: false
