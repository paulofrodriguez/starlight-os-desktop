---
modules-search: [ local, /usr/lib/x86_64-linux-gnu/calamares/modules ]
sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - displaymanager
    - starlight-user-avatar
    - networkcfg
    - hwclock
    - services-systemd
    - grubcfg
    - starlight-bootloader
    - umount
  - show:
    - finished
branding: starlight
prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false
